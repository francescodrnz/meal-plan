<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#1a1610">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* Stili aggiuntivi per Workout */
  .tabs { position: static !important; } /* Rimuove lo sticky per non sovrapporsi scrollando */
  
  .header-link {
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--pill-bg);
    padding: 6px 12px;
    border-radius: 12px;
    font-weight: 600;
  }
  .chrono-display {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    text-align: center;
    margin: 10px 0 20px;
    color: var(--accent);
    cursor: pointer;
    user-select: none;
  }
  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .exercise-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--pill-bg);
  }
  .set-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    transition: opacity 0.2s;
  }
  .set-row:last-child { border-bottom: none; }
  .set-row.done {
    opacity: 0.5;
  }
  .set-row.done .set-label {
    text-decoration: line-through;
  }
  .set-label {
    font-weight: 600;
    font-size: 0.9rem;
    width: 44px;
  }
  .set-input {
    width: 50px;
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    text-align: center;
    color: var(--text);
    cursor: text;
    -moz-appearance: textfield;
  }
  .set-input::-webkit-outer-spin-button,
  .set-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .set-input:focus { outline: none; border-color: var(--accent2); background: var(--card); }
  .set-input.provisional {
    color: var(--muted) !important;
  }
  .input-group {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .input-label {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .adjust-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--pill-bg);
    color: var(--text);
    font-weight: 700;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }
  .adjust-btn:active { background: var(--border); }
  .done-btn {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--pill-bg);
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .set-row.done .done-btn {
    background: var(--accent2);
    color: white;
    border-color: var(--accent2);
  }
  .ultima-sessione-row {
    padding: 10px 16px;
    background: var(--input-bg);
    font-size: 0.75rem;
    color: var(--text);
    border-top: 1px solid var(--border);
    text-align: center;
  }
  
  /* Peso Tab */
  .weight-input-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .weight-input-row input[type="date"],
  .weight-input-row input[type="number"] {
    flex: 1;
    min-width: 100px;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--input-bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
  }
  .weight-input-row button {
    flex: 1 1 100%;
    padding: 10px 16px;
    background: var(--accent2);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
  }
  
  .stats-block {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: var(--pill-bg);
    padding: 12px 8px;
    border-radius: 10px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .stat-lbl {
    font-size: 0.65rem;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }
  
  .chart-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 20px;
  }
  
  .weight-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .weight-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .weight-date { font-weight: 600; color: var(--muted); font-size: 0.85rem; }
  .weight-val { font-weight: 700; font-family: 'Syne', sans-serif; font-size: 1.1rem; }
  .weight-actions button {
    background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 4px; color: var(--muted);
  }
  
  /* Storico Tab */
  .history-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    padding: 16px;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  .history-date { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; text-transform: capitalize; }
  .history-dur { font-size: 0.85rem; font-weight: 600; color: var(--accent); }
  .history-del { color: #d9534f; background: none; border: none; cursor: pointer; font-size: 1.1rem; }
  .history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .history-table th { text-align: left; padding: 4px 0; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
  .history-table td { padding: 6px 0; border-bottom: 1px solid var(--border); }
  .history-table tr:last-child td { border-bottom: none; }
  .history-ex { font-weight: 600; }
</style>
</head>
<body>

<header style="position: relative;">
  <h1>🏋️ Allenamento</h1>
  <a href="index.html" class="header-link">← Meal Plan</a>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab(event, 'allenamento')">Allenamento</button>
  <button class="tab" onclick="showTab(event, 'peso')">Peso</button>
  <button class="tab" onclick="showTab(event, 'storico')">Storico</button>
  <button class="tab" onclick="showTab(event, 'info')">Info</button>
</div>

<!-- TAB ALLENAMENTO -->
<div id="tab-allenamento" class="section active">
  <div class="chrono-display" id="chrono" onclick="toggleChrono()">00:00</div>
  
  <div id="exercises-container"></div>
  
  <textarea id="workout-notes" class="spesa-note-area" style="width: 100%; min-height: 80px; padding: 12px; margin: 12px 0; border: 1.5px solid var(--border); border-radius: 10px; background: var(--input-bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.875rem;" placeholder="Note sessione (opzionale)..." oninput="updateNotes(this.value)"></textarea>
  
  <button id="btn-concludi" class="confirm-btn" style="opacity: 0.5; pointer-events: none;" onclick="concludiAllenamento()">Concludi allenamento</button>
</div>

<!-- TAB PESO -->
<div id="tab-peso" class="section">
  <div class="weight-input-row" style="align-items: center;">
    <input type="date" id="peso-date" style="flex: 1; min-width: 110px;">
    <div class="input-wrapper" style="flex: 1; display: flex;">
      <button class="adjust-btn" onclick="adjustPeso(-0.1)">-</button>
      <input type="number" id="peso-val" step="0.1" placeholder="kg" class="set-input" style="flex:1; width:auto; margin: 0; text-align:center;" oninput="this.classList.remove('provisional')">
      <button class="adjust-btn" onclick="adjustPeso(0.1)">+</button>
    </div>
    <button onclick="salvaPeso()" style="flex: 1 1 100%;">Salva</button>
  </div>
  
  <div id="peso-stats" class="stats-block" style="display:none">
    <div class="stat-box">
      <div class="stat-lbl">Ultimi 7 gg</div>
      <div class="stat-val" id="stat-curr">--</div>
    </div>
    <div class="stat-box">
      <div class="stat-lbl">Prec. 7 gg</div>
      <div class="stat-val" id="stat-prev">--</div>
    </div>
    <div class="stat-box">
      <div class="stat-lbl">Delta</div>
      <div class="stat-val" id="stat-delta">--</div>
    </div>
  </div>
  
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
    <div style="font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);">Andamento</div>
    <select id="chart-timeframe" class="set-input" style="width: auto; padding: 4px 8px; font-size: 0.75rem;" onchange="renderPeso()">
      <option value="7">7 giorni</option>
      <option value="14">14 giorni</option>
      <option value="30">1 mese</option>
      <option value="60">2 mesi</option>
      <option value="90">3 mesi</option>
      <option value="180">6 mesi</option>
      <option value="365">12 mesi</option>
      <option value="max" selected>Max</option>
    </select>
  </div>
  <div class="chart-container">
    <canvas id="pesoChart"></canvas>
  </div>
  
  <div class="weight-list" id="peso-list"></div>
</div>

<!-- TAB STORICO -->
<div id="tab-storico" class="section">
  <div id="storico-list"></div>
</div>

<!-- TAB INFO -->
<div id="tab-info" class="section">
  <div class="info-note" style="background:#141a24;border-left:3px solid #3a7bc8;color:#a8c4e8;">
    <strong>Sincronizzazione Dati</strong><br>
    Usa questa sezione per trasferire o salvare un backup di tutti i dati di allenamento e peso.
    <textarea id="workout-sync-area" style="width:100%; min-height:100px; padding:12px; margin-top:10px; border-radius:10px; background:var(--input-bg); color:var(--text); border:1.5px solid var(--border); font-size:0.75rem;" placeholder="Codice di sincronizzazione..."></textarea>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
      <button class="done-btn" style="text-align:center; padding:10px;" onclick="exportWorkoutData()">Copia Dati 📋</button>
      <button class="done-btn" style="text-align:center; padding:10px;" onclick="importWorkoutData()">Importa Dati 📥</button>
    </div>
    <button class="done-btn" style="width:100%;text-align:center; padding:10px; margin-top:8px; background:#0088cc; color:white; border:none;" onclick="backupToTelegram('workout')">Backup Telegram 🤖</button>
  </div>
</div>

<script>
// Tab Logic
function showTab(evt, tabId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  evt.currentTarget.classList.add('active');
  if (tabId === 'peso') renderPeso();
  if (tabId === 'storico') renderStorico();
}

// Data structures & Constants
const EXERCISES = [
  "Goblet Squat",
  "Rematore",
  "Hip Thrust",
  "Push Up",
  "Overhead Press"
];
const SETS_PER_EX = 2;
const TOTAL_SETS = EXERCISES.length * SETS_PER_EX;

let workoutActive = JSON.parse(localStorage.getItem('workout_active'));
let chronoInterval = null;

function createEmptyState() {
  return Array(TOTAL_SETS).fill(null).map(() => ({ reps: '', kg: '', done: false, reps_prov: false, kg_prov: false }));
}

function prepopulateState(stateArr) {
  const sessions = JSON.parse(localStorage.getItem('workout_sessions') || '[]');
  if (sessions.length > 0) {
    const lastSessionSets = sessions[0].sets;
    let setIdx = 0;
    EXERCISES.forEach((ex) => {
      for (let i = 1; i <= SETS_PER_EX; i++) {
        const lastSet = lastSessionSets.find(s => s.exercise === ex && s.set === i);
        if (lastSet) {
          stateArr[setIdx].reps = lastSet.reps;
          stateArr[setIdx].reps_prov = true;
          if (ex !== 'Push Up') {
            stateArr[setIdx].kg = lastSet.kg;
            stateArr[setIdx].kg_prov = true;
          }
        }
        setIdx++;
      }
    });
  }
  return stateArr;
}

// Initialize workout state if null
if (!workoutActive) {
  workoutActive = {
    started_at: null,
    offset: 0,
    is_running: false,
    notes: '',
    sets_state: prepopulateState(createEmptyState())
  };
}

function updateNotes(val) {
  workoutActive.notes = val;
  saveActive();
}

// CHRONO LOGIC
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function updateChrono() {
  if (!workoutActive.started_at) return;
  const now = Date.now();
  const diffSec = Math.floor((now - workoutActive.started_at) / 1000);
  document.getElementById('chrono').innerText = formatTime(diffSec);
}

function toggleChrono() {
  if (workoutActive.is_running) {
    workoutActive.is_running = false;
    workoutActive.offset = Date.now() - workoutActive.started_at;
    workoutActive.started_at = null;
    clearInterval(chronoInterval);
    chronoInterval = null;
  } else {
    workoutActive.is_running = true;
    workoutActive.started_at = Date.now() - (workoutActive.offset || 0);
    chronoInterval = setInterval(updateChrono, 1000);
  }
  saveActive();
  renderChrono();
}

function renderChrono() {
  if (workoutActive.started_at && workoutActive.is_running) {
    if (!chronoInterval) chronoInterval = setInterval(updateChrono, 1000);
    updateChrono();
  } else {
    document.getElementById('chrono').innerText = formatTime(Math.floor((workoutActive.offset || 0) / 1000));
  }
}

function getUltimaSessione(exerciseName) {
  const sessions = JSON.parse(localStorage.getItem('workout_sessions') || '[]');
  for (let sess of sessions) {
    const exSets = sess.sets.filter(s => s.exercise === exerciseName);
    if (exSets.length > 0) {
      return exSets.map(s => exerciseName === 'Push Up' ? `${s.reps} rep` : `${s.reps}x${s.kg}kg`).join(' | ');
    }
  }
  return null;
}

// Render Allenamento
function renderAllenamento() {
  const container = document.getElementById('exercises-container');
  container.innerHTML = '';
  
  let setIdx = 0;
  EXERCISES.forEach((ex) => {
    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.innerHTML = `<div class="exercise-title">${ex}</div>`;
    
    for (let i = 1; i <= SETS_PER_EX; i++) {
      const s = workoutActive.sets_state[setIdx];
      const row = document.createElement('div');
      row.className = `set-row ${s.done ? 'done' : ''}`;
      row.id = `set-row-${setIdx}`;
      
      const kgHtml = ex === 'Push Up' ? '<div class="input-group" style="visibility:hidden"></div>' : `
        <div class="input-group">
          <span class="input-label">kg</span>
          <div class="input-wrapper">
            <button class="adjust-btn" id="btn-kg-minus-${setIdx}" onclick="adjustSet(${setIdx}, 'kg', -0.5)" ${s.done ? 'disabled' : ''}>-</button>
            <input type="number" class="set-input ${s.kg_prov ? 'provisional' : ''}" step="0.5" value="${s.kg}" id="input-kg-${setIdx}" oninput="this.classList.remove('provisional'); updateSet(${setIdx}, 'kg', this.value)" ${s.done ? 'disabled' : ''}>
            <button class="adjust-btn" id="btn-kg-plus-${setIdx}" onclick="adjustSet(${setIdx}, 'kg', 0.5)" ${s.done ? 'disabled' : ''}>+</button>
          </div>
        </div>
      `;

      row.innerHTML = `
        <div class="set-label">Set ${i}</div>
        <div class="input-group">
          <span class="input-label">reps</span>
          <div class="input-wrapper">
            <button class="adjust-btn" id="btn-reps-minus-${setIdx}" onclick="adjustSet(${setIdx}, 'reps', -1)" ${s.done ? 'disabled' : ''}>-</button>
            <input type="number" class="set-input ${s.reps_prov ? 'provisional' : ''}" min="1" value="${s.reps}" id="input-reps-${setIdx}" oninput="this.classList.remove('provisional'); updateSet(${setIdx}, 'reps', this.value)" ${s.done ? 'disabled' : ''}>
            <button class="adjust-btn" id="btn-reps-plus-${setIdx}" onclick="adjustSet(${setIdx}, 'reps', 1)" ${s.done ? 'disabled' : ''}>+</button>
          </div>
        </div>
        ${kgHtml}
        <button class="done-btn" onclick="toggleSet(${setIdx})">✓</button>
      `;
      card.appendChild(row);
      setIdx++;
    }
    
    const ultima = getUltimaSessione(ex);
    if (ultima) {
      const ultRow = document.createElement('div');
      ultRow.className = 'ultima-sessione-row';
      ultRow.innerHTML = `<span style="font-weight:700;color:var(--muted)">Ultima sessione:</span> ${ultima}`;
      card.appendChild(ultRow);
    }
    
    container.appendChild(card);
  });
  
  checkConcludi();
  renderChrono();
  const notesEl = document.getElementById('workout-notes');
  if (notesEl && workoutActive.notes) notesEl.value = workoutActive.notes;
}

function adjustSet(idx, field, delta) {
  let current = parseFloat(workoutActive.sets_state[idx][field]);
  if (isNaN(current)) current = 0;
  let next = current + delta;
  if (next < 0) next = 0;
  workoutActive.sets_state[idx][field] = next;
  workoutActive.sets_state[idx][field + '_prov'] = false;
  saveActive();
  
  const input = document.getElementById(`input-${field}-${idx}`);
  if (input) {
    input.value = next;
    input.classList.remove('provisional');
  }
}

function updateSet(idx, field, val) {
  workoutActive.sets_state[idx][field] = val;
  workoutActive.sets_state[idx][field + '_prov'] = false;
  saveActive();
}

function toggleSet(idx) {
  const s = workoutActive.sets_state[idx];
  s.done = !s.done;
  saveActive();
  
  const row = document.getElementById(`set-row-${idx}`);
  if (row) {
    if (s.done) row.classList.add('done');
    else row.classList.remove('done');
  }
  
  ['reps', 'kg'].forEach(f => {
    const input = document.getElementById(`input-${f}-${idx}`);
    if (input) input.disabled = s.done;
    const btnMinus = document.getElementById(`btn-${f}-minus-${idx}`);
    if (btnMinus) btnMinus.disabled = s.done;
    const btnPlus = document.getElementById(`btn-${f}-plus-${idx}`);
    if (btnPlus) btnPlus.disabled = s.done;
  });

  checkConcludi();
}

function saveActive() {
  if (!workoutActive.is_running && workoutActive.started_at) {
    workoutActive.offset = Date.now() - workoutActive.started_at;
  } else if (workoutActive.is_running) {
    workoutActive.offset = Date.now() - workoutActive.started_at;
  }
  localStorage.setItem('workout_active', JSON.stringify(workoutActive));
}

function checkConcludi() {
  const btn = document.getElementById('btn-concludi');
  const allDone = workoutActive.sets_state.every(s => s.done);
  if (allDone) {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  } else {
    btn.style.opacity = '0.5';
    btn.style.pointerEvents = 'none';
  }
}

function concludiAllenamento() {
  if (!confirm('Vuoi concludere l\'allenamento?')) return;
  
  if (chronoInterval) {
    clearInterval(chronoInterval);
    workoutActive.offset = Date.now() - workoutActive.started_at;
  }
  
  const sessions = JSON.parse(localStorage.getItem('workout_sessions') || '[]');
  
  const setsData = [];
  let idx = 0;
  EXERCISES.forEach(ex => {
    for (let i = 1; i <= SETS_PER_EX; i++) {
      const s = workoutActive.sets_state[idx];
      setsData.push({ exercise: ex, set: i, reps: s.reps, kg: ex === 'Push Up' ? '' : s.kg });
      idx++;
    }
  });
  
  sessions.unshift({
    date: new Date().toISOString(),
    duration_seconds: Math.floor((workoutActive.offset || 0) / 1000),
    notes: workoutActive.notes || '',
    sets: setsData
  });
  localStorage.setItem('workout_sessions', JSON.stringify(sessions));
  
  // Reset with prepopulated values for next time
  workoutActive = {
    started_at: null,
    offset: 0,
    is_running: false,
    notes: '',
    sets_state: prepopulateState(createEmptyState())
  };
  saveActive();
  const notesEl = document.getElementById('workout-notes');
  if (notesEl) notesEl.value = '';
  renderAllenamento();
  alert('Allenamento salvato con successo!');
}

// ==================== PESO ====================
let chartInstance = null;

function getCSSVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function renderPeso() {
  const log = JSON.parse(localStorage.getItem('body_weight_log') || '[]');
  log.sort((a, b) => new Date(b.date) - new Date(a.date)); 
  
  document.getElementById('peso-date').value = new Date().toISOString().split('T')[0];
  
  const pesoVal = document.getElementById('peso-val');
  if (!pesoVal.value && log.length > 0) {
    pesoVal.value = log[0].weight;
    pesoVal.classList.add('provisional');
  }
  
  const listEl = document.getElementById('peso-list');
  listEl.innerHTML = '';
  
  log.forEach((entry, i) => {
    const d = new Date(entry.date).toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
    const div = document.createElement('div');
    div.className = 'weight-item';
    div.innerHTML = `
      <div>
        <div class="weight-date">${d}</div>
        <div class="weight-val">${entry.weight} kg</div>
      </div>
      <div class="weight-actions">
        <button onclick="editPeso(${i})">✎</button>
        <button onclick="deletePeso(${i})">🗑</button>
      </div>
    `;
    listEl.appendChild(div);
  });
  
  renderStatsAndChart(log);
}

function salvaPeso() {
  const d = document.getElementById('peso-date').value;
  const w = parseFloat(document.getElementById('peso-val').value);
  if (!d || isNaN(w)) return;
  
  let log = JSON.parse(localStorage.getItem('body_weight_log') || '[]');
  const existingIdx = log.findIndex(e => e.date === d);
  if (existingIdx >= 0) {
    log[existingIdx].weight = w;
  } else {
    log.push({ date: d, weight: w });
  }
  localStorage.setItem('body_weight_log', JSON.stringify(log));
  const pesoVal = document.getElementById('peso-val');
  pesoVal.value = '';
  pesoVal.classList.remove('provisional');
  renderPeso();
}

function adjustPeso(delta) {
  const pesoVal = document.getElementById('peso-val');
  let current = parseFloat(pesoVal.value);
  if (isNaN(current)) current = 0;
  let next = current + delta;
  if (next < 0) next = 0;
  pesoVal.value = next.toFixed(1);
  pesoVal.classList.remove('provisional');
}

function editPeso(idx) {
  const log = JSON.parse(localStorage.getItem('body_weight_log') || '[]');
  log.sort((a, b) => new Date(b.date) - new Date(a.date));
  document.getElementById('peso-date').value = log[idx].date;
  const pesoVal = document.getElementById('peso-val');
  pesoVal.value = log[idx].weight;
  pesoVal.classList.remove('provisional');
}

function deletePeso(idx) {
  if (!confirm('Eliminare questo peso?')) return;
  const log = JSON.parse(localStorage.getItem('body_weight_log') || '[]');
  log.sort((a, b) => new Date(b.date) - new Date(a.date));
  log.splice(idx, 1);
  localStorage.setItem('body_weight_log', JSON.stringify(log));
  renderPeso();
}

function renderStatsAndChart(log) {
  if (log.length < 7) {
    document.getElementById('peso-stats').style.display = 'none';
  } else {
    document.getElementById('peso-stats').style.display = 'grid';
    
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const todayTime = now.getTime();
    
    let currSum = 0, currCount = 0;
    let prevSum = 0, prevCount = 0;
    
    log.forEach(e => {
      const d = new Date(e.date);
      d.setHours(0, 0, 0, 0);
      const diffDays = Math.floor((todayTime - d.getTime()) / 86400000);
      
      if (diffDays >= 0 && diffDays < 7) { 
        currSum += e.weight; currCount++; 
      } else if (diffDays >= 7 && diffDays < 14) { 
        prevSum += e.weight; prevCount++; 
      }
    });
    
    const currAvg = currCount ? (currSum / currCount).toFixed(1) : '--';
    const prevAvg = prevCount ? (prevSum / prevCount).toFixed(1) : '--';
    let delta = '--';
    if (currAvg !== '--' && prevAvg !== '--') {
      const diff = (currAvg - prevAvg).toFixed(1);
      delta = diff > 0 ? `+${diff} ▲` : `${diff} ▼`;
    }
    
    document.getElementById('stat-curr').innerText = currAvg !== '--' ? currAvg : '--';
    document.getElementById('stat-prev').innerText = prevAvg !== '--' ? prevAvg : '--';
    document.getElementById('stat-delta').innerText = delta;
  }
  
  // CHART
  const ctx = document.getElementById('pesoChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  
  const tfSelect = document.getElementById('chart-timeframe');
  const timeframe = tfSelect ? tfSelect.value : 'max';
  
  const chartData = [...log].sort((a, b) => new Date(a.date) - new Date(b.date));
  let labels = [];
  let dataPoints = [];

  if (chartData.length > 0) {
    let startDate;
    let endDate = new Date();
    endDate.setHours(0,0,0,0);

    if (timeframe === 'max') {
      startDate = new Date(chartData[0].date);
      startDate.setHours(0,0,0,0);
    } else {
      const days = parseInt(timeframe, 10);
      startDate = new Date(endDate);
      startDate.setDate(endDate.getDate() - days + 1);
    }

    if (startDate > endDate) startDate = new Date(endDate);

    let lastKnownWeight = null;
    for (let i = chartData.length - 1; i >= 0; i--) {
      let d = new Date(chartData[i].date);
      d.setHours(0,0,0,0);
      if (d < startDate) {
        lastKnownWeight = chartData[i].weight;
        break;
      }
    }

    let currentDate = new Date(startDate);
    let isFirstDay = true;
    while (currentDate <= endDate) {
      const dateStr = currentDate.getFullYear() + '-' + String(currentDate.getMonth() + 1).padStart(2, '0') + '-' + String(currentDate.getDate()).padStart(2, '0');
      labels.push(`${currentDate.getDate()}/${currentDate.getMonth()+1}`);
      
      const entry = chartData.find(e => e.date === dateStr);
      if (entry) {
        dataPoints.push(entry.weight);
      } else {
        if (isFirstDay && lastKnownWeight !== null) {
          dataPoints.push(lastKnownWeight);
        } else {
          dataPoints.push(null);
        }
      }
      
      isFirstDay = false;
      currentDate.setDate(currentDate.getDate() + 1);
    }
  }

  const accent = getCSSVar('--accent') || '#c85a2a';
  const text = getCSSVar('--text') || '#1a1610';
  const gridColor = getCSSVar('--border') || '#e0d8c8';
  
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Peso (kg)',
        data: dataPoints,
        borderColor: accent,
        backgroundColor: accent,
        borderWidth: 2,
        pointRadius: 3,
        spanGaps: true,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: text }, grid: { color: gridColor } },
        y: { ticks: { color: text }, grid: { color: gridColor } }
      }
    }
  });
}

// ==================== STORICO ====================
function renderStorico() {
  const sessions = JSON.parse(localStorage.getItem('workout_sessions') || '[]');
  const listEl = document.getElementById('storico-list');
  listEl.innerHTML = '';
  
  if (sessions.length === 0) {
    listEl.innerHTML = '<div class="info-note">Nessun allenamento completato.</div>';
    return;
  }
  
  sessions.forEach((sess, i) => {
    const d = new Date(sess.date).toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    const dur = formatTime(sess.duration_seconds);
    
    const card = document.createElement('div');
    card.className = 'history-card';
    
    let noteHtml = sess.notes ? `<div style="font-size: 0.8rem; color: var(--muted); margin-bottom: 8px;"><em>Note: ${sess.notes}</em></div>` : '';
    
    let rowsHtml = '';
    sess.sets.forEach(s => {
      rowsHtml += `
        <tr>
          <td class="history-ex">${s.exercise}</td>
          <td>Set ${s.set}</td>
          <td>${s.reps} rep</td>
          <td>${s.exercise === 'Push Up' ? '-' : s.kg + ' kg'}</td>
        </tr>
      `;
    });
    
    card.innerHTML = `
      <div class="history-header">
        <div>
          <div class="history-date">${d}</div>
          <div class="history-dur">⏳ ${dur}</div>
        </div>
        <button class="history-del" onclick="deleteSession(${i})">🗑</button>
      </div>
      ${noteHtml}
      <table class="history-table">
        ${rowsHtml}
      </table>
    `;
    listEl.appendChild(card);
  });
}

function deleteSession(idx) {
  if (!confirm('Eliminare questo allenamento dallo storico?')) return;
  const sessions = JSON.parse(localStorage.getItem('workout_sessions') || '[]');
  sessions.splice(idx, 1);
  localStorage.setItem('workout_sessions', JSON.stringify(sessions));
  renderStorico();
}

  const data = {
    workout_sessions: JSON.parse(localStorage.getItem('workout_sessions') || '[]'),
    workout_active: JSON.parse(localStorage.getItem('workout_active') || 'null'),
    body_weight_log: JSON.parse(localStorage.getItem('body_weight_log') || '[]')
  };
  const str = btoa(encodeURIComponent(JSON.stringify(data)));
  const area = document.getElementById('workout-sync-area');
  area.value = str;
  area.select();
  document.execCommand('copy');
  alert('Dati copiati negli appunti!');
}

async function compressToBase64(dataObj) {
  const jsonStr = JSON.stringify(dataObj);
  const stream = new Blob([jsonStr]).stream().pipeThrough(new CompressionStream('deflate'));
  const blob = await new Response(stream).blob();
  const buffer = await blob.arrayBuffer();
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (let i = 0; i < bytes.byteLength; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return 'DEFLATE_' + btoa(binary);
}

async function decompressFromBase64(str) {
  if (str.startsWith('DEFLATE_')) {
    const b64 = str.substring(8);
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate'));
    const text = await new Response(stream).text();
    return JSON.parse(text);
  } else {
    return JSON.parse(decodeURIComponent(atob(str)));
  }
}

async function importWorkoutData() {
  const str = document.getElementById('workout-sync-area').value.trim();
  if (!str) return;
  try {
    const data = await decompressFromBase64(str);
    if (data.workout_sessions) localStorage.setItem('workout_sessions', JSON.stringify(data.workout_sessions));
    if (data.workout_active !== undefined) localStorage.setItem('workout_active', JSON.stringify(data.workout_active));
    if (data.body_weight_log) localStorage.setItem('body_weight_log', JSON.stringify(data.body_weight_log));
    alert('Dati importati con successo!');
    location.reload();
  } catch(e) {
    alert('Codice non valido o corrotto.');
  }
}

async function backupToTelegram(type) {
  if (type !== 'workout') return;
  const data = {
    workout_sessions: JSON.parse(localStorage.getItem('workout_sessions') || '[]'),
    workout_active: JSON.parse(localStorage.getItem('workout_active') || 'null'),
    body_weight_log: JSON.parse(localStorage.getItem('body_weight_log') || '[]')
  };
  const str = await compressToBase64(data);
  const text = `/backup_workout ${str}`;
  const url = `https://t.me/botchecontaimessaggibot?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}
